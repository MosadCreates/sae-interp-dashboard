# SAE training configuration — large
activations_path: "data/activations.h5"
d_sae: 12288             # expansion factor 16x
lambda_l1: 6.0e-5
lr: 3.0e-4
batch_size: 4096
n_steps: 300_000
resample_every: 25_000
warmup_steps: 1000
wandb_project: "mini-sae-trainer"
seed: 42
output_dir: "models/sae_large"
log_every: 100
save_every: 5000
