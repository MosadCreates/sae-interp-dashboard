# SAE training configuration — small
activations_path: "data/activations.h5"
d_sae: 3072              # expansion factor 4x
lambda_l1: 1.0e-4
lr: 4.0e-4
batch_size: 4096
n_steps: 100_000
resample_every: 25_000
warmup_steps: 1000
wandb_project: "mini-sae-trainer"
seed: 42
output_dir: "models/sae_small"
log_every: 100
save_every: 5000
